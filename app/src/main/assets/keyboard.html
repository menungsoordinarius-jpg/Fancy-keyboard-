<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fancy Keyboard IME</title>
  <link rel="stylesheet" href="keyboard.css">
  <script src="fontMap.js"></script>
</head>
<body>
  <!-- Key Preview Bubble -->
  <div id="key-preview" class="key-preview">A</div>

  <div class="keyboard-container" id="keyboard-container">
    <!-- Header Toolbar -->
    <div class="keyboard-toolbar">
      <div class="toolbar-group">
        <!-- Font Switcher Button: Placed right above Q -->
        <button id="font-switcher-btn" class="toolbar-btn font-switcher-btn" title="Tap to switch font, hold for menu">
          <span id="font-switcher-label" class="font-label">ABC</span>
        </button>
        <span id="active-font-badge" class="active-font-badge">Normal</span>
      </div>

      <div class="toolbar-group">
        <!-- Switch Keyboard / Globe Button -->
        <button id="globe-btn" class="toolbar-btn" title="Ganti Keyboard (IM)">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </button>
        
        <!-- Symbol Mode Quick Switch -->
        <button id="mode-toggle-btn" class="toolbar-btn">?123</button>

        <!-- Open Settings -->
        <button id="settings-btn" class="toolbar-btn">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Main Keyboard Body -->
    <div id="keyboard-body" class="keyboard-body">
      <!-- QWERTY view rendered dynamically by JS -->
    </div>
  </div>

  <!-- Modal Font Selection Grid -->
  <div id="font-grid-modal" class="modal-overlay">
    <div class="modal-header">
      <span class="modal-title">Pilih Gaya Font Unicode</span>
      <button id="modal-close-btn" class="modal-close">&times;</button>
    </div>
    <div id="font-grid" class="font-grid">
      <!-- Generated dynamically in JS -->
    </div>
  </div>

  <script src="keyboard.js"></script>
</body>
</html>
